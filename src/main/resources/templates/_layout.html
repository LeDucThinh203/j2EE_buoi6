<!DOCTYPE html>
<html lang="vi"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Quản Lý Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .navbar-brand { font-weight: 700; font-size: 1.25rem; letter-spacing: 0.5px; }
        .card { border: none; border-radius: 12px; transition: transform .2s, box-shadow .2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12) !important; }
        .card-img-top { object-fit: cover; height: 200px; border-radius: 12px 12px 0 0; background: #e9ecef; }
        .footer { background: #212529; color: #adb5bd; padding: 1.2rem 0; }
        .page-header { background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
                        color: white; border-radius: 12px; padding: 1.5rem 2rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">
            <i class="bi bi-shop-window me-2 text-info"></i>Quản Lý Sản Phẩm
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link px-3" th:href="@{/products}">
                        <i class="bi bi-grid me-1"></i>Sản phẩm
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" th:href="@{/products/add}">
                        <i class="bi bi-plus-circle me-1"></i>Thêm mới
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div layout:fragment="content"></div>
</div>

<footer class="footer mt-5">
    <div class="container text-center">
        <p class="mb-0 small">&copy; 2025 — Phát triển ứng dụng với J2EE</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmBXNPQV9LNR3yl8eFRNS4aDgbbF"
        crossorigin="anonymous"></script>
</body>
</html>
