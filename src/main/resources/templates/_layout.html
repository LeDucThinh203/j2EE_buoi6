<!DOCTYPE html>
<html lang="vi"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Quản Lý Sản Phẩm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg: #f3f7f9;
            --surface: #ffffff;
            --surface-soft: #f7fbfd;
            --text-main: #13212b;
            --text-muted: #5b6b75;
            --brand: #0e7490;
            --brand-strong: #155e75;
            --accent: #f59e0b;
            --danger: #dc2626;
            --border-soft: rgba(14, 116, 144, 0.18);
            --shadow-soft: 0 14px 36px rgba(15, 23, 42, 0.08);
            --radius-lg: 18px;
            --radius-md: 14px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            color: var(--text-main);
            font-family: "Be Vietnam Pro", sans-serif;
            background:
                radial-gradient(1000px 500px at 0% -15%, rgba(14, 116, 144, 0.20), transparent 55%),
                radial-gradient(800px 420px at 100% 0%, rgba(245, 158, 11, 0.18), transparent 55%),
                linear-gradient(180deg, #f8fcff 0%, var(--bg) 100%);
            min-height: 100vh;
        }

        .glass-nav {
            background: rgba(19, 33, 43, 0.92);
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 24px rgba(2, 6, 23, 0.2);
        }

        .navbar-brand {
            font-family: "Sora", sans-serif;
            font-weight: 700;
            letter-spacing: 0.2px;
            font-size: 1.05rem;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
        }

        .brand-chip {
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            background: linear-gradient(135deg, #0ea5b7 0%, #0e7490 100%);
            color: #e0f2fe;
            font-size: 0.9rem;
        }

        .nav-link {
            color: #d7e3ea;
            border-radius: 10px;
            font-weight: 500;
            transition: background-color .2s ease, color .2s ease;
        }

        .nav-link:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.12);
        }

        .main-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 1.35rem 1rem 2.6rem;
        }

        .soft-card {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: var(--shadow-soft);
        }

        .page-header {
            background: linear-gradient(125deg, #155e75 0%, #0ea5b7 45%, #22c55e 100%);
            color: #ecfeff;
            border-radius: var(--radius-lg);
            padding: 1.35rem 1.5rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 20px 30px rgba(14, 116, 144, 0.25);
        }

        .section-title {
            font-family: "Sora", sans-serif;
            letter-spacing: 0.2px;
            font-size: 1.22rem;
            margin: 0;
        }

        .btn-brand {
            border: 0;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-strong) 100%);
            box-shadow: 0 10px 20px rgba(14, 116, 144, 0.28);
        }

        .btn-brand:hover {
            color: #ffffff;
            filter: brightness(1.02);
        }

        .footer {
            color: #607481;
            padding: 1rem 0 1.4rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .fade-up {
            animation: fadeUp 0.55s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .main-shell { padding-top: 1rem; }
            .page-header { padding: 1.1rem 1rem; }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark glass-nav">
    <div class="container-fluid main-shell py-2">
        <a class="navbar-brand" th:href="@{/products}">
            <span class="brand-chip"><i class="bi bi-grid-1x2"></i></span>
            Quản Lý Sản Phẩm
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link px-3" th:href="@{/products}">
                        <i class="bi bi-grid me-1"></i>Sản phẩm
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" th:href="@{/products/add}">
                        <i class="bi bi-plus-circle me-1"></i>Thêm mới
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="main-shell fade-up">
    <div layout:fragment="content"></div>
</div>

<footer class="footer">
    <div class="main-shell">
        <p class="mb-0">&copy; 2026 — Product Dashboard for J2EE</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmBXNPQV9LNR3yl8eFRNS4aDgbbF"
        crossorigin="anonymous"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
