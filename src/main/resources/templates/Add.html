<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm sách mới</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 30px; 
            background-color: #ffffff;
        }
        h2 { 
            color: #333; 
            font-size: 24px;
            margin-bottom: 20px;
        }
        form { 
            width: 400px; 
        }
        .form-group {
            margin-bottom: 12px;
        }
        label { 
            display: inline-block;
            width: 80px;
            font-size: 14px;
        }
        input[type="text"], input[type="number"] { 
            width: 250px; 
            padding: 6px; 
            border: 1px solid #999; 
            font-size: 14px;
        }
        button { 
            margin-left: 80px;
            margin-top: 10px;
            padding: 6px 20px; 
            background-color: #f0f0f0; 
            border: 1px solid #999; 
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { 
            background-color: #e0e0e0; 
        }
        .error {
            color: #dc3545;
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            padding: 6px 10px;
            margin-top: 5px;
            font-size: 12px;
            border-radius: 4px;
            display: block;
            margin-left: 80px;
            width: 250px;
        }
        input.invalid {
            border-color: #dc3545 !important;
        }
        input.valid {
            border-color: #28a745 !important;
        }
    </style>
</head>
<body>
    <h2>Thêm sách mới</h2>
    
    <form th:action="@{/books/add}" th:object="${book}" method="post">
        <div class="form-group">
            <label for="title">Tiêu đề:</label>
            <input type="text" id="title" th:field="*{title}" required>
        </div>
        
        <div class="form-group">
            <label for="author">Tác giả:</label>
            <input type="text" id="author" th:field="*{author}" required>
        </div>
        
        <button type="submit">Thêm</button>
    </form>
    
    <script>
        // Real-time validation cho Title
        document.getElementById('title').addEventListener('input', function(e) {
            const value = e.target.value.trim();
            let existingError = this.parentElement.querySelector('.error');
            
            if (existingError) {
                existingError.remove();
            }
            
            if (value === '') {
                const errorDiv = document.createElement('span');
                errorDiv.className = 'error';
                errorDiv.textContent = 'Tiêu đề không được để trống';
                this.parentElement.appendChild(errorDiv);
                this.classList.add('invalid');
                this.classList.remove('valid');
            } else {
                this.classList.add('valid');
                this.classList.remove('invalid');
            }
        });
        
        // Real-time validation cho Author
        document.getElementById('author').addEventListener('input', function(e) {
            const value = e.target.value.trim();
            let existingError = this.parentElement.querySelector('.error');
            
            if (existingError) {
                existingError.remove();
            }
            
            if (value === '') {
                const errorDiv = document.createElement('span');
                errorDiv.className = 'error';
                errorDiv.textContent = 'Tác giả không được để trống';
                this.parentElement.appendChild(errorDiv);
                this.classList.add('invalid');
                this.classList.remove('valid');
            } else {
                this.classList.add('valid');
                this.classList.remove('invalid');
            }
        });
        
        // Validate on form submit
        document.querySelector('form').addEventListener('submit', function(e) {
            const title = document.getElementById('title');
            const author = document.getElementById('author');
            let hasError = false;
            
            if (title.value.trim() === '') {
                title.dispatchEvent(new Event('input'));
                hasError = true;
            }
            
            if (author.value.trim() === '') {
                author.dispatchEvent(new Event('input'));
                hasError = true;
            }
            
            if (hasError) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
