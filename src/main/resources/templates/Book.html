<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sách</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 30px; 
            background-color: #ffffff;
        }
        h2 { 
            color: #333; 
            font-size: 24px;
            margin-bottom: 10px;
        }
        a.add-link {
            color: #0066cc;
            text-decoration: underline;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }
        table { 
            border-collapse: collapse; 
            width: 600px; 
            margin-top: 10px;
            background-color: white;
        }
        th, td { 
            border: 1px solid #000; 
            padding: 8px 12px; 
            text-align: left; 
            font-size: 14px;
        }
        th { 
            background-color: #e8e8e8;
            font-weight: bold;
        }
        td a { 
            color: #0066cc; 
            text-decoration: underline; 
            margin-right: 10px;
            cursor: pointer;
        }
        td form {
            display: inline;
        }
        td button {
            background: none;
            border: none;
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
        }
        .search-box {
            margin-bottom: 15px;
        }
        .search-box input {
            padding: 6px 10px;
            border: 1px solid #999;
            border-radius: 4px;
            width: 300px;
            font-size: 14px;
        }
        .search-box input:focus {
            outline: none;
            border-color: #0066cc;
        }
        .search-box button {
            padding: 6px 12px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 5px;
            font-size: 14px;
        }
        .search-box button:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <h2>Danh sách sách</h2>
    <a href="/books/add" class="add-link">Thêm sách mới</a>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tìm kiếm sách..." onkeyup="searchBooks()">
        <button onclick="clearSearch()">Clear</button>
    </div>
    
    <table id="bookTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tiêu đề</th>
                <th>Tác giả</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}">1</td>
                <td th:text="${book.title}">Spring boot</td>
                <td th:text="${book.author}">Huy Cuong</td>
                <td>
                    <a th:href="@{/books/edit/{id}(id=${book.id})}">Sửa</a>
                    <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post" 
                          onsubmit="return confirm('Bạn có chắc chắn muốn xóa sách này không?');">
                        <button type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    
    <script>
        // Hàm tìm kiếm realtime
        function searchBooks() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase().trim();
            const table = document.getElementById('bookTable');
            const rows = table.getElementsByTagName('tbody')[0].getElementsByTagName('tr');
            
            let visibleCount = 0;
            
            // Lặp qua tất cả các dòng trong bảng
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const title = row.getElementsByTagName('td')[1]; // Cột Tiêu đề
                const author = row.getElementsByTagName('td')[2]; // Cột Tác giả
                
                if (title && author) {
                    const titleText = title.textContent || title.innerText;
                    const authorText = author.textContent || author.innerText;
                    
                    // Tìm kiếm trong cả tiêu đề và tác giả
                    if (titleText.toLowerCase().indexOf(filter) > -1 || 
                        authorText.toLowerCase().indexOf(filter) > -1) {
                        row.style.display = '';
                        visibleCount++;
                    } else {
                        row.style.display = 'none';
                    }
                }
            }
            
            // Hiển thị thông báo nếu không tìm thấy kết quả
            let noResultRow = document.getElementById('noResultRow');
            if (visibleCount === 0 && filter !== '') {
                if (!noResultRow) {
                    noResultRow = table.getElementsByTagName('tbody')[0].insertRow(0);
                    noResultRow.id = 'noResultRow';
                    const cell = noResultRow.insertCell(0);
                    cell.colSpan = 4;
                    cell.style.textAlign = 'center';
                    cell.style.padding = '20px';
                    cell.style.color = '#666';
                    cell.innerHTML = '⚠️ Không tìm thấy sách phù hợp';
                }
                noResultRow.style.display = '';
            } else if (noResultRow) {
                noResultRow.style.display = 'none';
            }
        }
        
        // Hàm xóa tìm kiếm
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchBooks();
            document.getElementById('searchInput').focus();
        }
    </script>
</body>
</html>
