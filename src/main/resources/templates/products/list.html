<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head><meta charset="UTF-8"><title>Danh Sách Sản Phẩm</title></head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3 class="mb-1 fw-bold"><i class="bi bi-box-seam me-2"></i>Danh Sách Sản Phẩm</h3>
            <p class="mb-0 opacity-75 small">Quản lý toàn bộ sản phẩm trong hệ thống</p>
        </div>
        <a th:href="@{/products/add}" class="btn btn-light fw-semibold shadow-sm">
            <i class="bi bi-plus-lg me-1 text-primary"></i>Thêm Sản Phẩm
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox display-3 d-block mb-3 opacity-25"></i>
        <p class="fs-5">Chưa có sản phẩm nào.</p>
        <a th:href="@{/products/add}" class="btn btn-primary mt-2">
            <i class="bi bi-plus-lg me-1"></i>Thêm ngay
        </a>
    </div>

    <!-- Product cards -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4" th:unless="${#lists.isEmpty(products)}">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100 shadow-sm">
                <img class="card-img-top"
                     alt="Ảnh sản phẩm"
                     th:src="${product.image != null and !#strings.isEmpty(product.image)} ?
                             (#strings.startsWith(product.image, 'http') ? product.image : '/images/' + product.image) :
                             'https://placehold.co/400x200/e9ecef/6c757d?text=No+Image'">
                <div class="card-body d-flex flex-column">
                    <span class="badge bg-info text-dark mb-2 align-self-start"
                          th:text="${product.category != null} ? ${product.category.name} : 'Chưa phân loại'"></span>
                    <h5 class="card-title fw-semibold" th:text="${product.name}"></h5>
                    <p class="card-text text-danger fw-bold fs-5 mt-auto mb-0"
                       th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
                </div>
                <div class="card-footer bg-white border-0 d-flex gap-2 pb-3 pt-2">
                    <a th:href="@{/products/edit/{id}(id=${product.id})}"
                       class="btn btn-outline-primary btn-sm flex-fill">
                        <i class="bi bi-pencil-square me-1"></i>Sửa
                    </a>
                    <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post" class="flex-fill"
                          onsubmit="return confirm('Xóa sản phẩm \'' + /*[[${product.name}]]*/ '' + '\'?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                            <i class="bi bi-trash me-1"></i>Xóa
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
