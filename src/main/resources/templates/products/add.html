<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id != null} ? 'Cập Nhật Sản Phẩm' : 'Thêm Sản Phẩm'">Form Sản Phẩm</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <!-- Page header -->
            <div class="page-header mb-4">
                <h3 class="mb-0 fw-bold">
                    <i class="bi bi-plus-circle me-2" th:unless="${product.id != null}"></i>
                    <i class="bi bi-pencil-square me-2" th:if="${product.id != null}"></i>
                    <span th:text="${product.id != null} ? 'Cập Nhật Sản Phẩm' : 'Thêm Sản Phẩm Mới'"></span>
                </h3>
            </div>

            <div class="card shadow-sm" style="border-radius:12px;">
                <div class="card-body p-4">
                    <form th:action="@{/products/save}" th:object="${product}" method="post" novalidate>

                        <!-- Tên sản phẩm -->
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">
                                <i class="bi bi-tag me-1 text-primary"></i>Tên sản phẩm
                            </label>
                            <input type="text" id="name" th:field="*{name}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''"
                                   placeholder="Nhập tên sản phẩm...">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <!-- URL Hình ảnh -->
                        <div class="mb-3">
                            <label for="image" class="form-label fw-semibold">
                                <i class="bi bi-image me-1 text-primary"></i>URL Hình ảnh
                            </label>
                            <input type="text" id="image" th:field="*{image}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('image')} ? ' is-invalid' : ''"
                                   placeholder="https://example.com/image.jpg">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
                            <div class="form-text text-muted">Nhập URL ảnh trực tiếp từ internet.</div>
                        </div>

                        <!-- Preview ảnh -->
                        <div class="mb-3 text-center" id="previewBox" style="display:none!important;">
                            <img id="imgPreview" src="" alt="Preview" class="img-thumbnail"
                                 style="max-height:180px; border-radius:8px;">
                        </div>

                        <!-- Giá -->
                        <div class="mb-3">
                            <label for="price" class="form-label fw-semibold">
                                <i class="bi bi-currency-dollar me-1 text-primary"></i>Giá (₫)
                            </label>
                            <input type="number" id="price" th:field="*{price}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('price')} ? ' is-invalid' : ''"
                                   placeholder="Nhập giá sản phẩm..." min="1">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <!-- Danh mục -->
                        <div class="mb-4">
                            <label for="category" class="form-label fw-semibold">
                                <i class="bi bi-folder me-1 text-primary"></i>Danh mục
                            </label>
                            <select id="category" th:field="*{category}" class="form-select">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"></option>
                            </select>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill fw-semibold">
                                <i class="bi bi-save me-1"></i>Lưu
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary flex-fill fw-semibold">
                                <i class="bi bi-arrow-left me-1"></i>Quay lại
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        // Live preview ảnh khi nhập URL
        const imgInput = document.getElementById('image');
        const previewBox = document.getElementById('previewBox');
        const imgPreview = document.getElementById('imgPreview');
        if (imgInput) {
            function updatePreview() {
                const url = imgInput.value.trim();
                if (url.startsWith('http')) {
                    imgPreview.src = url;
                    previewBox.style.removeProperty('display');
                } else {
                    previewBox.style.setProperty('display', 'none', 'important');
                }
            }
            imgInput.addEventListener('input', updatePreview);
            updatePreview();
        }
    </script>
</th:block>
</body>
</html>
